<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hybrid Cloud Demo</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #667eea, #764ba2, #ff758c, #42e695);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        overflow: hidden;
        color: white;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .container {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 38px;
        margin-bottom: 20px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(145deg, #ff7eb3, #ff758c);
        color: white;
        cursor: pointer;
        box-shadow: 0 0 15px #ff758c, 0 8px #c94f6d;
        transition: all 0.2s ease;
    }

    button:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 0 25px #ff758c, 0 12px #c94f6d;
    }

    button:active {
        transform: translateY(4px);
        box-shadow: 0 4px #c94f6d;
    }

    #output {
        margin-top: 20px;
        font-size: 20px;
        opacity: 0;
        transition: opacity 1s ease;
    }

    .loader {
        margin-top: 20px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top: 4px solid white;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        display: none;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }
</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1> Hybrid Cloud Project</h1>

    <button onclick="getData()">Get Data from Backend</button>

    <div class="loader" id="loader"></div>

    <p id="output"></p>
</div>

<script>
    async function getData() {
        const loader = document.getElementById("loader");
        const output = document.getElementById("output");

        loader.style.display = "block";
        output.style.opacity = 0;

        const res = await fetch("https://backend-service-jkn0.onrender.com/api");
        const data = await res.json();

        loader.style.display = "none";
        output.innerText = data.message;
        output.style.opacity = 1;
    }

    // PARTICLES EFFECT
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3,
            speedX: Math.random() - 0.5,
            speedY: Math.random() - 0.5
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;

            ctx.fillStyle = "white";
            ctx.fillRect(p.x, p.y, p.size, p.size);

            if (p.x > canvas.width) p.x = 0;
            if (p.x < 0) p.x = canvas.width;
            if (p.y > canvas.height) p.y = 0;
            if (p.y < 0) p.y = canvas.height;
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
