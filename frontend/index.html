<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hybrid Cloud Ultra UI</title>

<style>
:root {
    --bg1: #667eea;
    --bg2: #764ba2;
    --text: white;
}

body.light {
    --bg1: #f5f7fa;
    --bg2: #c3cfe2;
    --text: #222;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, var(--bg1), var(--bg2));
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: var(--text);
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 2s ease;
}

h1 {
    font-size: 36px;
}

button {
    padding: 15px 30px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(145deg, #ff7eb3, #ff758c);
    color: white;
    box-shadow: 0 0 15px #ff758c;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: scale(1.05);
}

button:active::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: rgba(255,255,255,0.3);
    top: -50%;
    left: -50%;
    border-radius: 50%;
    animation: ripple 0.5s;
}

@keyframes ripple {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 20px;
}

.loader {
    margin: 20px auto;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

#output {
    margin-top: 20px;
    font-size: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
}

.show {
    opacity: 1 !important;
    transform: translateY(0) !important;
}

canvas {
    position: absolute;
    z-index: -1;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌗</div>

<canvas id="particles"></canvas>

<div class="container">
    <h1>Hybrid Cloud Ultra</h1>

    <button onclick="getData()">Fetch Data</button>

    <div class="loader" id="loader"></div>

    <p id="output"></p>
</div>

<script>
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

async function getData() {
    clickSound.play();

    const loader = document.getElementById("loader");
    const output = document.getElementById("output");

    loader.style.display = "block";
    output.classList.remove("show");

    const res = await fetch("https://backend-service-jkn0.onrender.com/api");
    const data = await res.json();

    loader.style.display = "none";
    output.innerText = data.message;
    output.classList.add("show");
}

function toggleTheme() {
    document.body.classList.toggle("light");
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*3,
        speedX: Math.random()-0.5,
        speedY: Math.random()-0.5
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.speedX;
        p.y+=p.speedY;
        ctx.fillStyle="white";
        ctx.fillRect(p.x,p.y,p.size,p.size);
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
